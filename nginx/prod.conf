# Keep a pool of persistent connections to the backend so Nginx doesn't open a
# new TCP handshake for every proxied request.
upstream backend {
  server backend:8000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  # Allow large file uploads (resumes, etc.)
  client_max_body_size 20m;

  # ── Security headers ────────────────────────────────────────────────────────
  add_header X-Frame-Options           "SAMEORIGIN"             always;
  add_header X-Content-Type-Options    "nosniff"                always;
  add_header X-XSS-Protection          "1; mode=block"          always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

  # ── Gzip compression ────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  # ── Static React SPA ────────────────────────────────────────────────────────
  location / {
    root  /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }

  # Cache hashed build assets (JS/CSS bundles) for 1 year
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    root    /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── API reverse proxy ───────────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";   # blank = enable keepalive to upstream
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # ── Health check passthrough ────────────────────────────────────────────────
  location /health {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    access_log off;
  }

  # ── Socket.IO WebSocket upgrade ─────────────────────────────────────────────
  # Separate location so the Upgrade headers are only set for WebSocket traffic.
  location /socket.io/ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
}
