# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.synccode.in;
    return 301 https://$host$request_uri;
}

# HTTPS — SSL termination + proxy to backend
server {
    listen 443 ssl;
    server_name api.synccode.in;

    ssl_certificate     /etc/letsencrypt/live/api.synccode.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.synccode.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # REST API
    location / {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Socket.IO — must upgrade to WebSocket
    location /socket.io/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
