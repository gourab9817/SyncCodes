# SyncCodes — production compose (EC2 / VPS / single host)

services:

  # ── Redis — Socket.IO pub/sub for multi-instance fan-out ───────────────────
  redis:
    image: redis:7-alpine
    container_name: syncodes-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Piston — sandboxed code execution ──────────────────────────────────────
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: syncodes-piston
    restart: unless-stopped
    networks:
      - internal
    privileged: true
    tmpfs:
      - /tmp:exec
    volumes:
      - piston-packages:/piston/packages
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:2000/api/v2/runtimes',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ── Backend API + Socket.IO ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: syncodes-backend:latest
    container_name: syncodes-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: "8000"
      SOCKET_AUTH_REQUIRED: "true"
      REDIS_URL: redis://redis:6379
      EXECUTION_BACKEND: piston
      EXECUTION_REQUIRE_AUTH: "true"
      PISTON_API_URL: http://piston:2000
    depends_on:
      redis:
        condition: service_healthy
      piston:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ── Nginx — SSL termination + reverse proxy to backend ────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: syncodes-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  redis-data:
  piston-packages:
